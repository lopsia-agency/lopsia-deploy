# Reverse proxy masquant le projet Supabase free-tier derriere vibesafe.lopsia.fr.
# Recoit du HTTP simple depuis Traefik (TLS termine par Cloudflare+Traefik en amont).
# Reemet vers Supabase en HTTPS avec SNI + Host forces (requis par le free tier).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Projet Supabase (garde cote serveur, jamais expose au navigateur)
    set $supabase_host uqzfhlfvoukznxkiahcz.supabase.co;

    # Resolution DNS a l'execution de l'upstream externe (DNS interne Docker)
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # WebSocket (Supabase Realtime)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # CRITIQUE free tier : Host + SNI doivent matcher le hostname du projet
    proxy_set_header Host $supabase_host;
    proxy_ssl_server_name on;
    proxy_ssl_session_reuse off;

    # En-tetes reverse-proxy standards
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Surfaces API utilisees par supabase-js
    location ~ ^/(auth|rest|storage|realtime|functions)/ {
        proxy_pass https://$supabase_host$request_uri;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
